<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLASH BEAT - チケット購入詳細</title>

  <!-- OGP basic（開発中の仮設定） -->
  <meta property="og:title" content="FLASH BEAT - 音楽フェス公式サイト">
  <meta property="og:description" content="Special Stage / 2027.8.10 SAT - 音が光になる夜。">
  <meta property="og:type" content="website">
  <!-- ★ここは本番URLが決まったら後で書き換え -->
  <meta property="og:url" content="https://YOUR-SCHOOL-DOMAIN/flash_beat_enhanced2.html">
  <!-- 画像パスだけ今のフォルダ構造に合わせておく -->
  <meta property="og:image" content="/images/ogp_flash_beat_1200x630_v01.png">
  <meta property="og:site_name" content="FLASH BEAT">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FLASH BEAT - 音楽フェス公式サイト">
  <meta name="twitter:description" content="Special Stage / 2027.8.10 SAT - 音が光になる夜。">
  <meta name="twitter:image" content="/images/ogp_flash_beat_1200x630_v01.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: #EAEAEA;
      background: linear-gradient(135deg, #2A297A 0%, #0E0E22 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景の光エフェクト */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      top: -200px;
      right: -200px;
      background: radial-gradient(circle, rgba(255, 94, 201, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      bottom: -250px;
      left: -250px;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ヘッダー */
    .header {
      text-align: left;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(255, 94, 201, 0.3);
    }

    /* メインコンテンツ */
    .main-content {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* セクションタイトル */
    .section-title {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      margin-bottom: 0.5rem;
    }

    /* チケットリスト */
    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 0 0.5rem;
    }

    .ticket-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ticket-item:last-child {
      border-bottom: none;
    }

    .ticket-type {
      font-size: 1.25rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.02em;
    }

    .ticket-details {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .ticket-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.02em;
    }

    .ticket-benefit {
      font-size: 0.95rem;
      font-weight: 400;
      color: #EAEAEA;
      opacity: 0.85;
    }

    /* CTAボタン */
    .cta-button {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      margin: 1rem auto 0;
      padding: 1rem 2rem;
      background: linear-gradient(90deg, #5dd9e9, #8fe0d4);
      border: none;
      border-radius: 50px;
      color: #FFFFFF;
      font-size: 1.1rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 15px rgba(93, 217, 233, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(93, 217, 233, 0.6);
      background: linear-gradient(90deg, #6ee3f3, #9feade);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    /* フッター情報 */
    .footer-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .disclaimer {
      font-size: 0.85rem;
      color: #EAEAEA;
      opacity: 0.7;
      text-align: center;
    }

    .back-link {
      font-size: 1rem;
      color: #FFFFFF;
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .back-link:hover {
      color: #5dd9e9;
      text-shadow: 0 0 8px rgba(93, 217, 233, 0.4);
    }

    /* レスポンシブ対応 */
    @media (max-width: 375px) {
      body {
        padding: 1.5rem 1rem;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .ticket-type,
      .ticket-price {
        font-size: 1.1rem;
      }

      .ticket-benefit {
        font-size: 0.85rem;
      }

      .cta-button {
        font-size: 1rem;
        padding: 0.9rem 1.5rem;
      }
    }

    @media (min-width: 768px) {
      .section-title {
        font-size: 2rem;
      }

      .ticket-type,
      .ticket-price {
        font-size: 1.4rem;
      }

      .cta-button {
        font-size: 1.2rem;
        max-width: 360px;
      }
    }

    /* アクセシビリティ：フォーカス時のスタイル */
    .cta-button:focus,
    .back-link:focus {
      outline: 2px solid #5dd9e9;
      outline-offset: 4px;
    }

    /* ページロードアニメーション */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      animation: fadeInUp 0.8s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <!-- ホームに戻るリンク（同タブで index_4.html へ遷移） -->
      <a href="./index.html" class="back-link" id="homeBack">ホームに戻る</a>
      <div class="logo">FLASH BEAT</div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- セクションタイトル -->
      <h1 class="section-title">チケット購入詳細</h1>

      <!-- チケットリスト -->
      <div class="ticket-list">
        <!-- 一般チケット -->
        <div class="ticket-item">
          <div class="ticket-type">一般</div>
          <div class="ticket-details">
            <div class="ticket-price">¥6,800</div>
            <div class="ticket-benefit">ステージ前エリア入場可<br>来場特典ステッカー</div>
          </div>
        </div>

        <!-- 学生チケット -->
        <div class="ticket-item">
          <div class="ticket-type">学生</div>
          <div class="ticket-details">
            <div class="ticket-price">¥5,000</div>
            <div class="ticket-benefit">ステージ前エリア入場可<br>ドリンク1本無料</div>
          </div>
        </div>

        <!-- VIPチケット -->
        <div class="ticket-item">
          <div class="ticket-type">VIP</div>
          <div class="ticket-details">
            <div class="ticket-price">¥12,000</div>
            <div class="ticket-benefit">バックステージ見学<br>サイン入りフェスTシャツ</div>
            <div class="ticket-benefit">優先エリア入場</div>
          </div>
        </div>
      </div>

      <!-- CTAボタン -->
      <a href="#purchase" class="cta-button" id="purchaseBtn">
        購入手続きはこちらから
      </a>

      <!-- フッター情報 -->
      <div class="footer-info">
        <p class="disclaimer">＊このイベントは架空です</p>
        <a href="./index.html" class="back-link" id="homeBack">ホームに戻る</a>
      </div>
    </main>
  </div>

  <script>
    // CTAボタンのクリックイベント（デモ用）
    document.getElementById('purchaseBtn').addEventListener('click', function(e) {
      e.preventDefault();
      
      // ボタンのテキストを一時的に変更
      const originalText = this.textContent;
      this.textContent = '処理中...';
      this.style.pointerEvents = 'none';
      
      // 2秒後に元に戻す（実際の実装では購入ページへ遷移）
      setTimeout(() => {
        this.textContent = originalText;
        this.style.pointerEvents = 'auto';
        alert('実際の購入ページへ遷移します\n（このサイトは架空のイベントです）');
      }, 2000);
    });

    // ホームに戻るリンク（スムーズスクロール対応）
    document.querySelector('.back-link').addEventListener('click', function(e) {
      // 実際の実装では、ここでページ遷移を行う
      console.log('ホームに戻ります');
    });
  </script>
</body>
</html>
